services:
  - type: web
    name: dash-mui-charts
    runtime: python
    repo: https://github.com/pip-install-python/dash-mui-charts
    branch: main
    buildCommand: pip install -r requirements.txt && pip install .
    startCommand: gunicorn app:server -b 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: MUI_PRO_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.12"
    healthCheckPath: /
    autoDeploy: true
