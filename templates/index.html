    <noscript>
        <div style="padding: 40px 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; max-width: 900px; margin: 0 auto; line-height: 1.7; color: #1a1b1e;">
            <h1 style="color: #1976d2; font-size: 2.5rem; margin-bottom: 0.5rem;">Dash MUI Charts</h1>
            <p style="font-size: 1.125rem; color: #495057; margin-bottom: 2rem;"><strong>Interactive MUI X Charts for Python Dash</strong></p>

            <div style="background: #e3f2fd; border-left: 4px solid #1976d2; padding: 1rem; margin-bottom: 2rem; border-radius: 4px;">
                <strong>JavaScript Required:</strong> This application requires JavaScript to display interactive chart examples and documentation.
            </div>

            <h2 style="color: #1a1b1e; font-size: 1.75rem; margin-top: 2rem; margin-bottom: 1rem;">9 Chart Components</h2>
            <ul style="margin: 1rem 0; line-height: 2; font-size: 1rem;">
                <li><strong>LineChart</strong> — Line and area charts with zoom/pan, multiple axes, stacking, brush selection</li>
                <li><strong>BarChart</strong> — Vertical/horizontal bars with stacking, labels, dataset mode, zoom/brush</li>
                <li><strong>CandlestickChart</strong> — OHLC candlestick charts with volume overlay and reference lines</li>
                <li><strong>PieChart</strong> — Pie, donut, and nested/concentric pie charts</li>
                <li><strong>ScatterChart</strong> — Scatter/point charts with z-axis color mapping and voronoi interaction</li>
                <li><strong>CompositeChart</strong> — Layer scatter + line plots on a single surface with zoom/pan</li>
                <li><strong>Heatmap</strong> — Matrix visualizations with customizable color scales</li>
                <li><strong>SparklineChart</strong> — Compact inline charts for dashboards and tables</li>
                <li><strong>LiveTradingChart</strong> — Real-time streaming charts for live data visualization</li>
            </ul>

            <h2 style="color: #1a1b1e; font-size: 1.75rem; margin-top: 2.5rem; margin-bottom: 1rem;">Installation</h2>
            <pre style="background: #f5f5f5; padding: 1rem; border-radius: 4px; font-size: 1rem;">pip install dash-mui-charts</pre>

            <h2 style="color: #1a1b1e; font-size: 1.75rem; margin-top: 2.5rem; margin-bottom: 1rem;">Resources</h2>
